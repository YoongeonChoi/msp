services:
  - type: web
    name: msp-control-api
    runtime: python
    plan: starter
    buildCommand: pip install -e .
    startCommand: uvicorn msp.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MSP_ENV
        value: render-preview
      - key: MSP_ALLOW_LIVE_MODE
        value: "false"
      - key: MSP_DB_PATH
        value: /var/data/msp.sqlite3

  - type: worker
    name: msp-execution-worker
    runtime: python
    plan: starter
    buildCommand: pip install -e .
    startCommand: python -m msp.workers.execution
    envVars:
      - key: MSP_ENV
        value: render-preview
      - key: MSP_ALLOW_LIVE_MODE
        value: "false"
      - key: MSP_DB_PATH
        value: /var/data/msp.sqlite3

  - type: worker
    name: msp-reconcile-worker
    runtime: python
    plan: starter
    buildCommand: pip install -e .
    startCommand: python -m msp.workers.reconcile
    envVars:
      - key: MSP_ENV
        value: render-preview
      - key: MSP_ALLOW_LIVE_MODE
        value: "false"
      - key: MSP_DB_PATH
        value: /var/data/msp.sqlite3
