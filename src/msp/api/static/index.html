<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MSP Control</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>MSP Control</h1>
          <p id="account">paper-main</p>
        </div>
        <div class="mode-strip">
          <span id="mode">READ_ONLY</span>
          <span id="version">v1</span>
        </div>
      </header>

      <section class="grid">
        <article class="panel status-panel">
          <div class="panel-head">
            <h2>Status</h2>
            <button id="refresh">Refresh</button>
          </div>
          <div class="metrics">
            <div>
              <span>Trading</span>
              <strong id="trading">false</strong>
            </div>
            <div>
              <span>Open</span>
              <strong id="open-orders">0</strong>
            </div>
            <div>
              <span>Unknown</span>
              <strong id="unknown-orders">0</strong>
            </div>
            <div>
              <span>Cash</span>
              <strong id="cash">0</strong>
            </div>
          </div>
        </article>

        <article class="panel command-panel">
          <h2>Commands</h2>
          <div class="button-row">
            <button data-command="arm">Paper</button>
            <button data-command="halt">Halt</button>
            <button data-command="kill" class="danger">Kill</button>
            <button data-command="unlock">Unlock</button>
          </div>
        </article>

        <article class="panel order-panel">
          <h2>Order Intent</h2>
          <form id="order-form">
            <label>
              Symbol
              <input name="symbol" value="005930" autocomplete="off" />
            </label>
            <label>
              Side
              <select name="side">
                <option>BUY</option>
                <option>SELL</option>
              </select>
            </label>
            <label>
              Quantity
              <input name="quantity" type="number" min="1" step="1" value="1" />
            </label>
            <label>
              Limit
              <input name="limit_price" type="number" min="1" step="1" value="70000" />
            </label>
            <button type="submit">Create Approved Intent</button>
          </form>
        </article>

        <article class="panel command-panel">
          <h2>Pipeline</h2>
          <div class="button-row">
            <button data-pipeline="data">Data</button>
            <button data-pipeline="research">Research</button>
            <button data-pipeline="rebalance">Rebalance</button>
            <button data-pipeline="approve" class="accent">Approve Latest</button>
          </div>
        </article>

        <article class="panel table-panel">
          <h2>Orders</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Side</th>
                  <th>Qty</th>
                  <th>Limit</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="orders"></tbody>
            </table>
          </div>
        </article>

        <article class="panel table-panel">
          <h2>Scores</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Date</th>
                  <th>Momentum</th>
                  <th>Quality</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody id="scores"></tbody>
            </table>
          </div>
        </article>

        <article class="panel table-panel">
          <h2>Rebalances</h2>
          <div id="rebalances" class="audit-list"></div>
        </article>

        <article class="panel table-panel">
          <h2>Audit</h2>
          <div id="audit" class="audit-list"></div>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
